<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIキャリアアドバイザー | 松竹梅マッチングシステム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080E1A;
    --surface: #0F172A;
    --card: #1A2540;
    --border: #1E3A5F;
    --accent: #4F7DFF;
    --accent2: #7C3AED;
    --gold: #F59E0B;
    --green: #10B981;
    --blue: #3B82F6;
    --text: #E8F0FF;
    --muted: #7B9CC8;
    --danger: #EF4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(79,125,255,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -100px; right: -100px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(124,58,237,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Header */
  header {
    background: linear-gradient(135deg, #0A1628 0%, #0F2044 100%);
    border-bottom: 1px solid var(--border);
    padding: 24px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent));
  }
  .header-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(20px, 5vw, 28px);
    font-weight: 800;
    background: linear-gradient(135deg, #ffffff, #A5C8FF);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
  }
  .header-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 0.5px;
  }
  .header-badges {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .badge {
    background: rgba(79,125,255,0.15);
    border: 1px solid rgba(79,125,255,0.3);
    border-radius: 20px;
    padding: 3px 12px;
    font-size: 11px;
    color: #A5C8FF;
  }

  /* Main */
  .container { max-width: 740px; margin: 0 auto; padding: 24px 16px 60px; }

  /* Tabs */
  .tabs {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 4px;
    margin-bottom: 24px;
    gap: 4px;
  }
  .tab-btn {
    flex: 1;
    padding: 11px 0;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700;
    font-size: 13px;
    transition: all 0.2s;
    background: transparent;
    color: var(--muted);
  }
  .tab-btn.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    box-shadow: 0 4px 16px rgba(79,125,255,0.3);
  }

  /* Form */
  .form-section { margin-bottom: 20px; }
  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    margin-bottom: 8px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .form-label span { color: var(--danger); }
  .form-input, .form-textarea {
    width: 100%;
    padding: 13px 16px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }
  .form-input:focus, .form-textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(79,125,255,0.15);
  }
  .form-textarea { resize: vertical; line-height: 1.7; }
  .form-hint { font-size: 11px; color: var(--muted); margin-top: 5px; }

  /* Button */
  .btn-analyze {
    width: 100%;
    padding: 17px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 900;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all 0.2s;
    box-shadow: 0 6px 24px rgba(79,125,255,0.35);
    letter-spacing: 0.3px;
  }
  .btn-analyze:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 10px 32px rgba(79,125,255,0.5);
  }
  .btn-analyze:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }
  .btn-back {
    width: 100%;
    padding: 13px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--surface);
    color: var(--muted);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    margin-top: 20px;
    transition: all 0.2s;
  }
  .btn-back:hover { border-color: var(--accent); color: var(--text); }

  /* Error */
  .error-box {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.4);
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 16px;
    color: #FCA5A5;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* Loader */
  .loader-wrap {
    text-align: center;
    padding: 60px 20px;
    animation: fadeIn 0.3s ease;
  }
  .loader-ring {
    width: 56px; height: 56px;
    border: 4px solid rgba(79,125,255,0.15);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
    margin: 0 auto 20px;
  }
  .loader-text { color: var(--muted); font-size: 14px; font-weight: 500; }
  .loader-sub { color: #4F6A8F; font-size: 12px; margin-top: 6px; }

  /* Result: candidate card */
  .candidate-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 24px;
    animation: fadeSlideIn 0.4s ease;
  }
  .section-title {
    font-size: 13px;
    font-weight: 700;
    color: #7B9CC8;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .profile-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 10px;
  }
  .profile-item {
    background: var(--surface);
    border-radius: 10px;
    padding: 10px 12px;
  }
  .profile-item-label { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
  .profile-item-value { font-size: 13px; font-weight: 600; color: var(--text); }
  .profile-full {
    background: var(--surface);
    border-radius: 10px;
    padding: 12px 14px;
    margin-top: 8px;
  }
  .concern-box {
    background: rgba(239,68,68,0.07);
    border: 1px solid rgba(239,68,68,0.25);
    border-radius: 10px;
    padding: 10px 14px;
    margin-top: 8px;
  }
  .concern-label { font-size: 11px; color: var(--danger); margin-bottom: 3px; }
  .concern-value { font-size: 13px; color: #FCA5A5; }

  /* Job cards */
  .jobs-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .job-card {
    border-radius: 18px;
    margin-bottom: 14px;
    overflow: hidden;
    border: 2px solid;
    transition: box-shadow 0.2s;
    animation: fadeSlideIn 0.4s ease both;
  }
  .job-card:hover { box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
  .job-header {
    padding: 16px 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    user-select: none;
  }
  .rank-badge {
    border-radius: 10px;
    padding: 5px 14px;
    font-size: 13px;
    font-weight: 800;
    white-space: nowrap;
    color: #fff;
  }
  .job-header-info { flex: 1; min-width: 0; }
  .job-company { font-weight: 800; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .job-role { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .job-score-wrap { text-align: right; flex-shrink: 0; }
  .job-score-label { font-size: 11px; color: var(--muted); }
  .job-score-num { font-size: 24px; font-weight: 900; }
  .job-chevron { font-size: 16px; flex-shrink: 0; transition: transform 0.2s; }
  .job-chevron.open { transform: rotate(180deg); }

  .job-body {
    border-top: 1px solid;
    padding: 18px;
    background: #fff;
    display: none;
  }
  .job-body.open { display: block; animation: fadeIn 0.2s ease; }

  .score-bar-wrap { margin-bottom: 16px; }
  .score-bar-label { font-size: 12px; color: #6B7280; margin-bottom: 5px; }
  .score-bar-track {
    height: 8px;
    background: #E5E7EB;
    border-radius: 4px;
    overflow: hidden;
    display: flex;
    align-items: center;
  }
  .score-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.8s ease;
  }
  .score-bar-num { font-size: 13px; font-weight: 700; margin-left: 8px; flex-shrink: 0; }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }
  .stat-box {
    background: #F8FAFC;
    border-radius: 10px;
    padding: 10px;
    text-align: center;
  }
  .stat-label { font-size: 11px; color: #6B7280; }
  .stat-value { font-size: 13px; font-weight: 700; color: #111; margin-top: 2px; }

  .info-rows { display: flex; flex-direction: column; gap: 8px; }
  .info-row {
    background: #F8FAFC;
    border-radius: 10px;
    padding: 11px 14px;
    border: 1px solid #E5E7EB;
  }
  .info-row.highlight {
    background: #FEFCE8;
    border-color: #FDE68A;
  }
  .info-row-label { font-size: 11px; color: #6B7280; margin-bottom: 3px; }
  .info-row-value { font-size: 13px; color: #111; line-height: 1.6; }
  .info-row.highlight .info-row-value { font-weight: 700; }

  .rank-reason {
    margin-top: 10px;
    background: #F1F5F9;
    border-radius: 8px;
    padding: 9px 13px;
    font-size: 11px;
    color: #64748B;
  }

  /* Strategy */
  .strategy-card {
    background: linear-gradient(135deg, #0E1B3D, #1A0E3D);
    border: 1px solid #2D3A6A;
    border-radius: 18px;
    padding: 20px;
    margin-top: 6px;
    animation: fadeSlideIn 0.4s ease 0.4s both;
  }
  .strategy-title {
    font-size: 13px;
    font-weight: 700;
    color: #818CF8;
    margin-bottom: 10px;
    letter-spacing: 0.5px;
  }
  .strategy-text { font-size: 14px; color: #C7D2FE; line-height: 1.8; }

  /* Empty */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
    animation: fadeIn 0.3s ease;
  }
  .empty-icon { font-size: 52px; margin-bottom: 16px; }
  .empty-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .empty-sub { font-size: 13px; }

  /* Keyframes */
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Mobile */
  @media (max-width: 480px) {
    .profile-grid { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .job-company { font-size: 14px; }
    .job-score-num { font-size: 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-title">🤖 AIキャリアアドバイザー</div>
  <div class="header-sub">面談記録 → 松竹梅マッチング → 提案資料を自動生成</div>
  <div class="header-badges">
    <span class="badge">🌟 松：最高条件</span>
    <span class="badge">✅ 竹：本命・現実的</span>
    <span class="badge">🔰 梅：滑り止め・基盤</span>
  </div>
</header>

<div class="container">
  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" id="tab-input" onclick="switchTab('input')">📝 入力フォーム</button>
    <button class="tab-btn" id="tab-result" onclick="switchTab('result')">📊 分析結果</button>
  </div>

  <!-- Input Panel -->
  <div id="panel-input">
    

    <div class="form-section">
      <label class="form-label">📋 面談記録 <span>*必須</span></label>
      <textarea id="interview" class="form-textarea" rows="11" placeholder="例）
氏名：田中太郎（28歳）
スキル：React, Node.js, AWS 3年
希望職種：フルスタックエンジニア
希望年収：600〜700万円
希望勤務地：東京・リモート可
転職理由：裁量を持って働きたい。現職はルーティン業務が多く成長を感じられない。
ビジョン：30代でCTOを目指したい
性格：負けず嫌い・自走型・コミュニケーション上手
懸念：転職回数が多い（3回）"></textarea>
    </div>

    <div class="form-section">
      <label class="form-label">💼 求人情報（任意）</label>
      <textarea id="jobs" class="form-textarea" rows="6" placeholder="例）
【求人A】株式会社〇〇 / バックエンドエンジニア / 600-800万 / 東京
【求人B】△△株式会社 / フルスタックエンジニア / 500-700万 / フルリモート

※ 空欄の場合、AIが面談記録をもとに松竹梅3件を自動提案します"></textarea>
      <div class="form-hint">💡 求人情報を入力すると、既存求人を松竹梅に分類します。未入力でもAIが自動提案します。</div>
    </div>

    <div id="error-box" class="error-box" style="display:none;">
      <span>⚠️</span><span id="error-text"></span>
    </div>

    <button class="btn-analyze" id="analyzeBtn" onclick="analyze()">
      🚀 AIで面談記録を分析・マッチング開始
    </button>
  </div>

  <!-- Result Panel -->
  <div id="panel-result" style="display:none;">
    <div id="result-content"></div>
    <button class="btn-back" onclick="switchTab('input')">← 入力フォームに戻る</button>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `あなたは人材紹介の成約率を最大化させる「AIキャリアアドバイザー」です。

ユーザーが入力した「面談記録」と「求人情報」を分析し、以下の形式でJSONのみを返してください。前置き・説明文・マークダウン記号は一切不要です。

## 出力フォーマット（JSON）

{
  "candidate": {
    "name": "氏名（不明の場合は「求職者」）",
    "skills": ["スキル1", "スキル2"],
    "desired_role": "希望職種",
    "desired_salary": "希望年収",
    "location": "希望勤務地",
    "career_vision": "キャリアビジョン・本質的欲求",
    "transfer_axis": "転職の軸",
    "personality": "性格的特徴",
    "concerns": "懸念点"
  },
  "jobs": [
    {
      "rank": "松 or 竹 or 梅",
      "company": "会社名",
      "role": "職種",
      "salary_range": "年収レンジ",
      "location": "勤務地",
      "employees": "従業員数",
      "document_pass_rate": "書類通過率（数値のみ, 例: 45）",
      "offer_rate": "内定率（数値のみ, 例: 20）",
      "match_score": 数値(0-100),
      "one_liner": "会社を一言で（30文字以内）",
      "stability": "規模・安定感の説明",
      "excitement": "仕事の醍醐味・得られるスキル",
      "conditions": "給与・休日・残業・勤務地まとめ",
      "why_recommend": "この求職者に勧める共感ポイント（面談記録に基づく）",
      "rank_reason": "松竹梅に分類した理由"
    }
  ],
  "summary": "全体的な転職戦略アドバイス（200文字以内）"
}

求人情報が入力されていない場合は、面談記録の内容から想定される理想的な求人を3件（松・竹・梅）創作して提案してください。
必ずJSONのみを返してください。`;

const RANK_CONFIG = {
  "松": { emoji: "🌟", color: "#B8860B", bg: "#FFFBF0", border: "#F59E0B", badgeBg: "#D97706", label: "最高条件", scoreColor: "#D97706" },
  "竹": { emoji: "✅", color: "#065F46", bg: "#F0FDF9", border: "#10B981", badgeBg: "#059669", label: "本命・現実的", scoreColor: "#059669" },
  "梅": { emoji: "🔰", color: "#1E40AF", bg: "#EFF6FF", border: "#3B82F6", badgeBg: "#2563EB", label: "滑り止め・基盤", scoreColor: "#2563EB" }
};

let currentResult = null;

function switchTab(tab) {
  document.getElementById('panel-input').style.display = tab === 'input' ? 'block' : 'none';
  document.getElementById('panel-result').style.display = tab === 'result' ? 'block' : 'none';
  document.getElementById('tab-input').classList.toggle('active', tab === 'input');
  document.getElementById('tab-result').classList.toggle('active', tab === 'result');
}

function showError(msg) {
  const box = document.getElementById('error-box');
  document.getElementById('error-text').textContent = msg;
  box.style.display = 'flex';
}
function hideError() {
  document.getElementById('error-box').style.display = 'none';
}

function setLoading(on) {
  const btn = document.getElementById('analyzeBtn');
  if (on) {
    btn.disabled = true;
    btn.innerHTML = '<div style="width:20px;height:20px;border:3px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;"></div> AI分析中...（10〜30秒）';
  } else {
    btn.disabled = false;
    btn.innerHTML = '🚀 AIで面談記録を分析・マッチング開始';
  }
}

async function analyze() {
  const apiKey = "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";
  const interview = document.getElementById('interview').value.trim();
  const jobs = document.getElementById('jobs').value.trim();
  hideError();

  if (!apiKey) { showError('APIキーを入力してください'); return; }
  if (!interview) { showError('面談記録を入力してください'); return; }

  setLoading(true);
  document.getElementById('result-content').innerHTML = `
    <div class="loader-wrap">
      <div class="loader-ring"></div>
      <div class="loader-text">🤖 AIが面談記録を分析しています...</div>
      <div class="loader-sub">松竹梅のマッチング・提案資料を生成中（10〜30秒）</div>
    </div>`;
  switchTab('result');

  try {
    const userContent = `【面談記録】\n${interview}\n\n${jobs ? `【求人情報】\n${jobs}` : '※求人情報は未入力のため、面談記録をもとに松竹梅3件を提案してください。'}`;

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        system: SYSTEM_PROMPT,
        messages: [{ role: 'user', content: userContent }]
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `APIエラー: ${res.status}`);
    }

    const data = await res.json();
    const text = data.content.map(b => b.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    currentResult = JSON.parse(clean);
    renderResult(currentResult);
  } catch(e) {
    document.getElementById('result-content').innerHTML = '';
    switchTab('input');
    showError(e.message || '解析に失敗しました');
  } finally {
    setLoading(false);
  }
}

function renderResult(data) {
  const c = data.candidate || {};
  const skills = Array.isArray(c.skills) ? c.skills.join('、') : (c.skills || '—');

  let html = `
  <div class="candidate-card">
    <div class="section-title">👤 求職者プロファイル：${esc(c.name || '求職者')}</div>
    <div class="profile-grid">
      <div class="profile-item"><div class="profile-item-label">💼 希望職種</div><div class="profile-item-value">${esc(c.desired_role || '—')}</div></div>
      <div class="profile-item"><div class="profile-item-label">💰 希望年収</div><div class="profile-item-value">${esc(c.desired_salary || '—')}</div></div>
      <div class="profile-item"><div class="profile-item-label">📍 希望勤務地</div><div class="profile-item-value">${esc(c.location || '—')}</div></div>
      <div class="profile-item"><div class="profile-item-label">🔧 スキル</div><div class="profile-item-value">${esc(skills)}</div></div>
    </div>
    <div class="profile-full">
      <div class="profile-item-label">🎯 転職の軸・キャリアビジョン</div>
      <div class="profile-item-value" style="font-size:13px;line-height:1.7;margin-top:4px;">${esc(c.transfer_axis || '')}${c.transfer_axis && c.career_vision ? '<br>' : ''}${esc(c.career_vision || '')}</div>
    </div>
    ${c.personality ? `<div class="profile-full" style="margin-top:8px;"><div class="profile-item-label">😊 性格的特徴</div><div class="profile-item-value" style="font-size:13px;">${esc(c.personality)}</div></div>` : ''}
    ${c.concerns ? `<div class="concern-box"><div class="concern-label">⚠️ 懸念点</div><div class="concern-value">${esc(c.concerns)}</div></div>` : ''}
  </div>`;

  html += `<div class="jobs-title">🏢 マッチング求人（松竹梅）</div>`;

  const rankOrder = ['松', '竹', '梅'];
  rankOrder.forEach((rank, idx) => {
    const job = (data.jobs || []).find(j => j.rank === rank);
    if (!job) return;
    const cfg = RANK_CONFIG[rank] || RANK_CONFIG['梅'];
    const score = parseInt(job.match_score) || 0;
    const scoreColor = score >= 80 ? '#10B981' : score >= 60 ? '#F59E0B' : '#EF4444';
    const cardId = `job-${rank}`;
    const bodyId = `body-${rank}`;

    html += `
    <div class="job-card" id="${cardId}" style="border-color:${cfg.border};animation-delay:${idx * 0.15}s">
      <div class="job-header" style="background:${cfg.bg};" onclick="toggleJob('${bodyId}', '${cardId}')">
        <div class="rank-badge" style="background:${cfg.badgeBg}">${cfg.emoji} ${rank}｜${cfg.label}</div>
        <div class="job-header-info">
          <div class="job-company" style="color:#111">${esc(job.company || '—')}</div>
          <div class="job-role">${esc(job.role || '')} ／ ${esc(job.salary_range || '')}</div>
        </div>
        <div class="job-score-wrap">
          <div class="job-score-label" style="color:#6B7280">マッチ度</div>
          <div class="job-score-num" style="color:${cfg.scoreColor}">${score}</div>
        </div>
        <div class="job-chevron" id="chevron-${rank}">▼</div>
      </div>
      <div class="job-body" id="${bodyId}" style="border-top-color:${cfg.border}">
        <div class="score-bar-wrap">
          <div class="score-bar-label">マッチスコア</div>
          <div style="display:flex;align-items:center">
            <div class="score-bar-track" style="flex:1">
              <div class="score-bar-fill" style="width:${score}%;background:${scoreColor}"></div>
            </div>
            <div class="score-bar-num" style="color:${scoreColor}">${score}点</div>
          </div>
        </div>
        <div class="stats-grid">
          <div class="stat-box"><div class="stat-label">📄 書類通過率</div><div class="stat-value">${esc(String(job.document_pass_rate || '—'))}%</div></div>
          <div class="stat-box"><div class="stat-label">🏆 内定率</div><div class="stat-value">${esc(String(job.offer_rate || '—'))}%</div></div>
          <div class="stat-box"><div class="stat-label">📍 勤務地</div><div class="stat-value">${esc(job.location || '—')}</div></div>
        </div>
        <div class="info-rows">
          <div class="info-row"><div class="info-row-label">🏢 会社を一言で</div><div class="info-row-value">${esc(job.one_liner || '—')}</div></div>
          <div class="info-row"><div class="info-row-label">📊 規模・安定感</div><div class="info-row-value">${esc(job.stability || '—')}</div></div>
          <div class="info-row"><div class="info-row-label">🚀 仕事の醍醐味</div><div class="info-row-value">${esc(job.excitement || '—')}</div></div>
          <div class="info-row"><div class="info-row-label">💰 条件まとめ</div><div class="info-row-value">${esc(job.conditions || '—')}</div></div>
          <div class="info-row highlight"><div class="info-row-label">💬 なぜあなたに勧めるか</div><div class="info-row-value">${esc(job.why_recommend || '—')}</div></div>
        </div>
        <div class="rank-reason">📌 分類理由：${esc(job.rank_reason || '—')}</div>
      </div>
    </div>`;
  });

  if (data.summary) {
    html += `
    <div class="strategy-card">
      <div class="strategy-title">🧭 転職戦略アドバイス</div>
      <div class="strategy-text">${esc(data.summary)}</div>
    </div>`;
  }

  document.getElementById('result-content').innerHTML = html;
}

function toggleJob(bodyId, cardId) {
  const body = document.getElementById(bodyId);
  const rank = bodyId.replace('body-', '');
  const chevron = document.getElementById('chevron-' + rank);
  const isOpen = body.classList.toggle('open');
  if (chevron) chevron.classList.toggle('open', isOpen);
}

function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/\n/g,'<br>');
}
</script>
</body>
</html>
